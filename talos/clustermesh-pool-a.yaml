apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: clustermesh-pool-a
spec:
  blocks:
    - start: 192.168.1.40
      stop: 192.168.1.49
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: clustermesh-l2-policy
spec:
  serviceSelector: {} # seleziona tutti i LoadBalancer Service
  nodeSelector: {} # abilitato su tutti i nodi
  interfaces:
    - "^ens18$" # o adatta: la tua interfaccia LAN
  externalIPs: true
  loadBalancerIPs: true
