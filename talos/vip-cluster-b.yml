apiVersion: v1
kind: Service
metadata:
  name: kubernetes-lb
  namespace: default
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.231
  ports:
    - name: https
      port: 6443
      targetPort: 6443
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: kubernetes-lb
  namespace: default
  labels:
    kubernetes.io/service-name: kubernetes-lb
addressType: IPv4
ports:
  - name: https
    port: 6443
endpoints:
  - addresses:
      - 192.168.0.120
      - 192.168.0.121
      - 192.168.0.122
