talosVersion: v1.10.3
kubernetesVersion: v1.33.1

clusterName: clb
endpoint: https://192.168.1.231:6443

clusterPodNets:
  - 10.2.0.0/16
clusterSvcNets:
  - 172.21.0.0/24

additionalApiServerCertSans:
  - 192.168.1.231  # VIP
  - 192.168.1.120
  - 192.168.1.121
  - 192.168.1.122
  - 127.0.0.1

additionalMachineCertSans:
  - 192.168.1.231  # VIP
  - 192.168.1.120
  - 192.168.1.121
  - 192.168.1.122
  - 127.0.0.1

patches:
  - |-
    machine:
      network:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
      time:
        disabled: false
        servers:
          - time.cloudflare.com
          - time.google.com
      kubelet:
        extraArgs:
          authorization-mode: AlwaysAllow

cluster:
  discovery:
    enabled: false
    registries:
      service:
        disabled: true

controlPlane:
  patches:
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true
        network:
          cni:
            name: flannel
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

nodes:
  - hostname: clb-cp01
    controlPlane: true
    ipAddress: 192.168.1.120
    installDisk: /dev/sda
    gateway: 192.168.1.254
    networkInterfaces:
      - interface: ens18
        dhcp: true
        vip:
          ip: 192.168.1.231

  - hostname: clb-cp02
    controlPlane: true
    ipAddress: 192.168.1.121
    installDisk: /dev/sda
    gateway: 192.168.1.254
    networkInterfaces:
      - interface: ens18
        dhcp: true
        vip:
          ip: 192.168.1.231

  - hostname: clb-cp03
    controlPlane: true
    ipAddress: 192.168.1.122
    installDisk: /dev/sda
    gateway: 192.168.1.254
    networkInterfaces:
      - interface: ens18
        dhcp: true
        vip:
          ip: 192.168.1.231

  - hostname: clb-wk01
    controlPlane: false
    ipAddress: 192.168.1.123
    installDisk: /dev/sda
    gateway: 192.168.1.254
      
  - hostname: clb-wk02
    controlPlane: false
    ipAddress: 192.168.1.124
    installDisk: /dev/sda
    gateway: 192.168.1.254
