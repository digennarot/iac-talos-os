talosVersion: v1.10.0
kubernetesVersion: v1.33.0

clusterName: clb
endpoint: https://192.168.0.120:6443

clusterPodNets:
  - 10.16.0.0/16
clusterSvcNets:
  - 10.17.0.0/16

additionalApiServerCertSans:
  - 192.168.0.231
  - 127.0.0.1
additionalMachineCertSans:
  - 192.168.0.231
  - 127.0.0.1

# Centralized patches for network, time, kubelet cert rotation, audit policy, CNI, and control-plane tuning
patches:
  # Machine-level patches
  - |-
    machine:
      network:
        nameservers:
          - 1.1.1.1
          - 1.0.0.1
      time:
        disabled: false
        servers:
          - time.cloudflare.com
          - time.google.com
      kubelet:
        extraArgs:
          authorization-mode: AlwaysAllow

cluster:
  discovery:
    enabled: false
    registries:
      service:
        disabled: true

controlPlane:
  patches:
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true
        network:
          cni:
            name: flannel
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

nodes:
  - hostname: clb-cp01
    controlPlane: true
    ipAddress: 192.168.0.120
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false
        vip:
          ip: 192.168.0.231

  - hostname: clb-cp02
    controlPlane: true
    ipAddress: 192.168.0.121
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false
        vip:
          ip: 192.168.0.231

  - hostname: clb-cp03
    controlPlane: true
    ipAddress: 192.168.0.122
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false
        vip:
          ip: 192.168.0.231

  - hostname: clb-wk01
    controlPlane: false
    ipAddress: 192.168.0.123
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false

  - hostname: clb-wk02
    controlPlane: false
    ipAddress: 192.168.0.124
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false

  - hostname: clb-wk03
    controlPlane: false
    ipAddress: 192.168.0.125
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false
