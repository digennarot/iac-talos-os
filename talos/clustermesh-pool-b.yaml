apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: clustermesh-pool-b
spec:
  blocks:
    - start: 192.168.1.51
      stop: 192.168.1.60
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: clustermesh-l2-policy
spec:
  serviceSelector: {} # seleziona tutti i LoadBalancer Service
  nodeSelector: {} # abilitato su tutti i nodi
  interfaces:
    - "^ens18$" # o adatta: la tua interfaccia LAN
  externalIPs: true
  loadBalancerIPs: true
---
apiVersion: v1
kind: Service
metadata:
  name: my-lb-service
  namespace: default
  labels:
    app: my-lb-app
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: nginx # il tuo pod deve avere questa label
