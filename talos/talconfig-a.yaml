talosVersion: v1.10.0
kubernetesVersion: v1.33.0

clusterName: cla
endpoint: https://192.168.1.230:6443

clusterPodNets:
  - 10.14.0.0/16
clusterSvcNets:
  - 10.15.0.0/16

additionalApiServerCertSans:
  - 192.168.0.230  # VIP
  - 192.168.0.110
  - 192.168.0.111
  - 192.168.0.112
  - 127.0.0.1

additionalMachineCertSans:
  - 192.168.0.230  # VIP
  - 192.168.0.110
  - 192.168.0.111
  - 192.168.0.112
  - 127.0.0.1

# Centralized patches for network, time, kubelet cert rotation, audit policy, CNI, and control-plane tuning
patches:
  # Machine-level patches
  - |-
    machine:
      network:
        nameservers:
          - 1.1.1.1
          - 1.0.0.1
      time:
        disabled: false
        servers:
          - time.cloudflare.com
          - time.google.com
      kubelet:
        extraArgs:
          authorization-mode: AlwaysAllow

cluster:
  discovery:
    enabled: false
    registries:
      service:
        disabled: true

controlPlane:
  patches:
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true
        network:
          cni:
            name: flannel
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

nodes:
  - hostname: cla-cp01
    controlPlane: true
    ipAddress: 192.168.1.110
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false

  - hostname: cla-cp02
    controlPlane: true
    ipAddress: 192.168.1.111
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false

  - hostname: cla-cp03
    controlPlane: true
    ipAddress: 192.168.1.112
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false

  - hostname: cla-wk01
    controlPlane: false
    ipAddress: 192.168.1.113
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false

  - hostname: cla-wk02
    controlPlane: false
    ipAddress: 192.168.1.114
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false
