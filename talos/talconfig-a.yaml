talosVersion: v1.10.3
kubernetesVersion: v1.33.1

clusterName: cla
endpoint: https://192.168.1.230:6443

clusterPodNets:
  - 10.1.0.0/16
clusterSvcNets:
  - 172.20.0.0/24

additionalApiServerCertSans:
  - 192.168.1.230  # VIP
  - 192.168.1.110
  - 192.168.1.111
  - 192.168.1.112
  - 127.0.0.1

additionalMachineCertSans:
  - 192.168.1.230  # VIP
  - 192.168.1.110
  - 192.168.1.111
  - 192.168.1.112
  - 127.0.0.1

# Centralized patches for network, time, kubelet cert rotation, audit policy, CNI, and control-plane tuning
patches:
  # Machine-level patches
  - |-
    machine:
      network:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
      time:
        disabled: false
        servers:
          - time.cloudflare.com
          - time.google.com
      kubelet:
        extraArgs:
          authorization-mode: AlwaysAllow

cluster:
  discovery:
    enabled: false
    registries:
      service:
        disabled: true

controlPlane:
  patches:
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true
        network:
          cni:
            name: flannel
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

nodes:
  - hostname: cla-cp01
    controlPlane: true
    installDisk: /dev/sda
    ipAddress: 192.168.1.110
    gateway: 192.168.1.254
    networkInterfaces:
      - interface: ens18
        dhcp: true
        vip:
          ip: 192.168.1.230

  - hostname: cla-cp02
    controlPlane: true
    installDisk: /dev/sda
    ipAddress: 192.168.1.111
    gateway: 192.168.1.254
    networkInterfaces:
      - interface: ens18
        dhcp: true
        vip:
          ip: 192.168.1.230

  - hostname: cla-cp03
    controlPlane: true
    installDisk: /dev/sda
    ipAddress: 192.168.1.112
    gateway: 192.168.1.254
    networkInterfaces:
      - interface: ens18
        dhcp: true
        vip:
          ip: 192.168.1.230

  - hostname: cla-wk01
    controlPlane: false
    installDisk: /dev/sda
    ipAddress: 192.168.1.113
    gateway: 192.168.1.254

  - hostname: cla-wk02
    controlPlane: false
    installDisk: /dev/sda
    ipAddress: 192.168.1.114
    gateway: 192.168.1.254


