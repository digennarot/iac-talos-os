talosVersion: v1.10.0
kubernetesVersion: v1.33.0

clusterName: cla
endpoint: https://192.168.0.110:6443

clusterPodNets:
  - 10.14.0.0/16
clusterSvcNets:
  - 10.15.0.0/16

additionalApiServerCertSans:
  - 192.168.0.110
  - 127.0.0.1

additionalMachineCertSans:
  - 192.168.0.110
  - 127.0.0.1

# Centralized patches for network, time, kubelet cert rotation, audit policy, CNI, and control-plane tuning
patches:
  # Machine-level patches
  - |-
    machine:
      network:
        nameservers:
          - 1.1.1.1
          - 1.0.0.1
      time:
        disabled: false
        servers:
          - time.cloudflare.com
          - time.google.com
      kubelet:
        extraArgs:
          # ⚠️ bypass all kubelet auth checks
          authorization-mode: AlwaysAllow

machine:
  kubelet:
    extraArgs:
      authentication-token-webhook: "true"
      authorization-mode: "Webhook,Node"


controlPlane:
  patches:
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
        proxy:
          disabled: true
        network:
          cni:
            name: flannel
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0

nodes:
  - hostname: cla-cp01
    controlPlane: true
    ipAddress: 192.168.0.110
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false
      # - deviceSelector:
      #     hardwareAddr: "02:00:0A:00:00:01"
        # dhcp: false

  - hostname: cla-wk01
    controlPlane: false
    ipAddress: 192.168.0.113
    installDisk: /dev/sda
    networkInterfaces:
      - interface: eth0
        dhcp: false
      # - deviceSelector:
      #     hardwareAddr: "02:00:0A:00:10:01"
        # dhcp: false
