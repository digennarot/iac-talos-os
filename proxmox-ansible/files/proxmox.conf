# /etc/dnsmasq.d/proxmox.conf

# Listen only on the Proxmox bridge
interface=vmbr0
bind-interfaces

# Don’t forward DNS for local names, skip private reverse lookups
domain-needed
bogus-priv

# Global DHCP pool (covers 192.168.0.100–192.168.0.200)
dhcp-range=192.168.0.100,192.168.0.140,24h

# ——————— Cluster A ———————
# Control-plane
dhcp-host=02:00:0A:00:00:01,192.168.0.110,clA-cp01,24h
dhcp-host=02:00:0A:00:00:02,192.168.0.111,clA-cp02,24h
dhcp-host=02:00:0A:00:00:03,192.168.0.112,clA-cp03,24h
# Workers
dhcp-host=02:00:0A:00:10:01,192.168.0.113,clA-wk01,24h
dhcp-host=02:00:0A:00:10:02,192.168.0.114,clA-wk02,24h
dhcp-host=02:00:0A:00:10:03,192.168.0.115,clA-wk03,24h

# ——————— Cluster B ———————
# Control-plane
dhcp-host=02:00:0A:01:00:01,192.168.0.120,clB-cp01,24h
dhcp-host=02:00:0A:01:00:02,192.168.0.121,clB-cp02,24h
dhcp-host=02:00:0A:01:00:03,192.168.0.122,clB-cp03,24h
# Workers
dhcp-host=02:00:0A:01:10:01,192.168.0.123,clB-wk01,24h
dhcp-host=02:00:0A:01:10:02,192.168.0.124,clB-wk02,24h
dhcp-host=02:00:0A:01:10:03,192.168.0.125,clB-wk03,24h

# ——————— Cluster C ———————
# Control-plane
dhcp-host=02:00:0A:02:00:01,192.168.0.130,clC-cp01,24h
dhcp-host=02:00:0A:02:00:02,192.168.0.131,clC-cp02,24h
dhcp-host=02:00:0A:02:00:03,192.168.0.132,clC-cp03,24h
# Workers
dhcp-host=02:00:0A:02:10:01,192.168.0.133,clC-wk01,24h
dhcp-host=02:00:0A:02:10:02,192.168.0.134,clC-wk02,24h
dhcp-host=02:00:0A:02:10:03,192.168.0.135,clC-wk03,24h
